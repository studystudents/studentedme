version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000/api/v1
    depends_on:
      - backend
    networks:
      - studented-network

networks:
  studented-network:
    external: true
